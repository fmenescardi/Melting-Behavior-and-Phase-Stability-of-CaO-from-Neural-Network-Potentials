[IO_INFORMATION] 
train_dir = .  
#Directory containing all training datasets (your .example)
data_dir = ./data/train
#Directory with validation datasets, same format
val_data_dir = ./data/val
#save frequency
save_epoch_freq = 20
#for "small" datasets, data_cache keeps configurations in memory
data_cache = True

[DATA_INFORMATION]
input_format = example   
atomic_sequence = Ca, O
output_offset = -135.895, -431.377

[MODEL_INFORMATION]
model_type = MLP
architecture = 256:128:1
descriptor_type = LATTE
nn_mode = list
pair_mod = 4000
at_mod = 100
Rc = 5.0
learnsig = True
sig = 0.1,2.0
descriptor_shape = 100,-:200,i,i:200,ij,ij:200,ijk,ijk:200,i,j,ij

[TRAINING_PARAMETERS]
batch_size = 40
learning_rate = const:1e-4:300000,exp:1e-4:1e-1:100000, const:1e-5:300000, exp:1e-5:1e-2:200000
l1_coef = 0.001
max_epochs = 3000
steps_per_epoch = 300 
forces_cost = 0.5
energy_cost = 1.5
energy_loss = per_at
